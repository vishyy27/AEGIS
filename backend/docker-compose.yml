version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_password
      POSTGRES_DB: risk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_user -d risk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://risk_user:risk_password@db:5432/risk_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretkey-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.main.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://risk_user:risk_password@db:5432/risk_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
